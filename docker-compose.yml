version: "3.9"

services:
  madibudget-postgres:
    image: postgres:16-alpine
    container_name: madibudget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-madibudget}
      POSTGRES_USER: ${POSTGRES_USER:-madibudget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-madibudget}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - madibudget-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-madibudget} -d ${POSTGRES_DB:-madibudget}"]
      interval: 10s
      timeout: 5s
      retries: 5

  madibudget-backend:
    build:
      context: ./backend
    container_name: madibudget-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-madibudget}:${POSTGRES_PASSWORD:-madibudget}@madibudget-postgres:5432/${POSTGRES_DB:-madibudget}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3040,http://127.0.0.1:3040,https://budget.gmadi.me}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-^https?://(localhost|127\.0\.0\.1|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3})(:\d+)?$}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-madibudget-dev-change-me}
      AUTH_TOKEN_EXPIRE_HOURS: ${AUTH_TOKEN_EXPIRE_HOURS:-12}
    ports:
      - "8000:8000"
    depends_on:
      madibudget-postgres:
        condition: service_healthy

  madibudget-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: madibudget-frontend
    restart: unless-stopped
    ports:
      - "3040:3040"
    depends_on:
      - madibudget-backend

volumes:
  madibudget-postgres-data:
